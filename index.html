<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inspire Therapy — Client Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:sans-serif;background:#F7EDE3;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:white;padding:2rem;border-radius:16px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
h2{color:#D94F1E;margin:0 0 1rem;}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;}
button{width:100%;padding:12px;background:#D94F1E;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:8px;}
.err{color:red;font-size:13px;margin-top:8px;display:none;}
.status{font-size:12px;color:#888;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <h2>Inspire Therapy Portal</h2>
  <p style="font-size:13px;color:#888;margin:0 0 1rem;">Sign in to continue</p>
  <input type="email" id="email" placeholder="Email address"/>
  <input type="password" id="pass" placeholder="Password"/>
  <button onclick="login()">Sign in</button>
  <div class="err" id="err">Invalid email or password.</div>
  <div class="status" id="status">Connecting to database...</div>
</div>
<script>
const SUPA_URL='https://pqosjpqrmguwhsdgluqn.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxb3NqcHFybWd1d2hzZGdsdXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODA5OTMsImV4cCI6MjA5MjM1Njk5M30.JLwQNH4RvUmEPsRbrfRyZbMQG0YLqDvcsFvjc5iEK9A';
const SB = supabase.createClient(SUPA_URL, SUPA_KEY);

// Test connection
SB.from('profiles').select('count').limit(1)
  .then(({data,error}) => {
    document.getElementById('status').textContent = 
      error ? 'DB error: ' + error.message : 'Connected! Ready to sign in.';
  });

async function login(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  document.getElementById('status').textContent = 'Signing in...';
  const {data,error} = await SB.auth.signInWithPassword({email,password:pass});
  if(error){
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent = error.message;
    document.getElementById('status').textContent = '';
  } else {
    document.getElementById('status').textContent = 'Signed in as ' + data.user.email + '! Redirecting...';
    document.getElementById('err').style.display='none';
  }
}
</script>
</body>
</html>
